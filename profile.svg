<svg fill="none" viewBox="0 0 580 340" width="580" height="340" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background: #0d1117;
          color: #8b949e;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
          border-radius: 12px;
          border: 1px solid #30363d;
          padding: 30px;
          height: 278px;
        }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .avatar {
          width: 80px; height: 80px;
          border-radius: 50%;
          border: 2px solid #58a6ff;
          background: url('https://github.com/jp710.png') no-repeat center/cover;
        }
        .name-container { flex: 1; }
        .greeting { color: #58a6ff; font-family: monospace; font-size: 14px; margin-bottom: 4px; }
        .name { color: #e6edf3; font-size: 24px; font-weight: 600; }
        .name span { color: #58a6ff; }
        
        /* Typing Animation */
        .typing {
          color: #bc8cff;
          font-family: monospace;
          font-size: 14px;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          border-right: 2px solid #bc8cff;
          animation: typing 4s steps(30, end) infinite, blink 0.8s step-end infinite;
        }
        @keyframes typing {
          0%, 10% { width: 0; }
          40%, 60% { width: 200px; } /* Adjust width based on text length */
          90%, 100% { width: 0; }
        }
        @keyframes blink { 50% { border-color: transparent; } }

        .divider { height: 1px; background: #30363d; margin: 20px 0; }

        .bio { list-style: none; padding: 0; margin: 0; line-height: 1.6; font-size: 14px; }
        .bio li { margin-bottom: 8px; opacity: 0; transform: translateY(10px); animation: fadeIn 0.5s forwards; }
        .bio li:nth-child(1) { animation-delay: 0.2s; }
        .bio li:nth-child(2) { animation-delay: 0.4s; }
        .bio li:nth-child(3) { animation-delay: 0.6s; }
        .bio li:nth-child(4) { animation-delay: 0.8s; }
        
        @keyframes fadeIn {
          to { opacity: 1; transform: translateY(0); }
        }
        b { color: #3fb950; font-weight: 600; }
      </style>

      <div class="container">
        <div class="header">
          <div class="avatar"></div>
          <div class="name-container">
            <div class="greeting">&lt;hello world /&gt;</div>
            <div class="name">Hi, I'm <span>JyotiPrakash</span> 👋</div>
            <div class="typing">Open Source Contributor 🌍</div>
          </div>
        </div>
        <div class="divider"></div>
        <ul class="bio">
          <li>🎓 <b>CS Student</b> &amp; passionate developer from India.</li>
          <li>🚀 Building cool projects at the intersection of <b>AI</b> &amp; <b>Web</b>.</li>
          <li>🌱 Currently learning <b>Next.js</b>, <b>Machine Learning</b> &amp; <b>Cloud</b>.</li>
          <li>⚡ Fun fact: I debug with coffee ☕ and deploy with prayers 🙏</li>
        </ul>
      </div>
    </div>
  </foreignObject>
</svg>
