<svg fill="none" viewBox="0 0 580 300" width="580" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Circular mask for the avatar -->
    <clipPath id="avatarClip">
      <circle cx="70" cy="70" r="40" />
    </clipPath>
  </defs>

  <!-- Background Card -->
  <rect width="580" height="300" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- VERIFIED AVATAR for jp7107 -->
  <image 
    x="30" y="30" 
    width="80" height="80" 
    href="https://avatars.githubusercontent.com/u/183929447?v=4" 
    clip-path="url(#avatarClip)"
  />
  <circle cx="70" cy="70" r="40" stroke="#58a6ff" stroke-width="2" fill="none" />

  <foreignObject x="0" y="0" width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .content {
          padding: 30px 30px 30px 130px;
          color: #8b949e;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .greeting { color: #58a6ff; font-family: monospace; font-size: 14px; margin-bottom: 4px; }
        .name { color: #e6edf3; font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .name span { color: #58a6ff; }
        
        .typing-container { height: 20px; display: flex; align-items: center; }
        .typing {
          color: #bc8cff;
          font-family: monospace;
          font-size: 14px;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          border-right: 2px solid #bc8cff;
          animation: typing 5s steps(25, end) infinite, blink 0.8s step-end infinite;
        }
        @keyframes typing {
          0%, 10% { width: 0; }
          45%, 55% { width: 210px; } 
          90%, 100% { width: 0; }
        }
        @keyframes blink { 50% { border-color: transparent; } }

        .divider { height: 1px; background: #30363d; margin: 20px 0 20px -100px; width: 520px; }

        .bio { list-style: none; padding: 0; margin: 0; line-height: 1.7; font-size: 13.5px; }
        .bio li { margin-bottom: 6px; opacity: 0; transform: translateY(10px); animation: fadeIn 0.5s forwards; }
        .bio li:nth-child(1) { animation-delay: 0.2s; }
        .bio li:nth-child(2) { animation-delay: 0.4s; }
        .bio li:nth-child(3) { animation-delay: 0.6s; }
        .bio li:nth-child(4) { animation-delay: 0.8s; }
        
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        b { color: #3fb950; font-weight: 600; }
      </style>

      <div class="content">
        <div class="greeting">&lt;hello world /&gt;</div>
        <div class="name">Hi, I'm <span>JyotiPrakash</span> 👋</div>
        <div class="typing-container">
          <div class="typing">Open Source Contributor 🌍</div>
        </div>
        
        <div class="divider"></div>
        
        <ul class="bio">
          <li>🎓 <b>CS Student</b> &amp; passionate developer from India.</li>
          <li>🚀 Building cool projects at the intersection of <b>AI</b> &amp; <b>Web</b>.</li>
          <li>🌱 Currently learning <b>Next.js</b>, <b>Machine Learning</b> &amp; <b>Cloud</b>.</li>
          <li>⚡ Fun fact: I debug with coffee ☕ and deploy with prayers 🙏</li>
        </ul>
      </div>
    </div>
  </foreignObject>
</svg>
